naftiko: "1.0.0-alpha1"

info:
  label: "Apache Livy Spark Job Management"
  description: "Workflow capability for data engineers and data scientists to manage interactive Spark sessions and submit batch Spark jobs via Apache Livy REST API."
  tags:
    - Apache Livy
    - Data Engineering
    - Data Science
    - Spark
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      LIVY_URL: LIVY_URL

capability:
  consumes:
    - import: livy-rest-api
      location: ./shared/livy-rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: livy-spark-management-api
      description: "Unified REST API for Apache Livy Spark job management."
      resources:
        - path: /v1/sessions
          name: sessions
          operations:
            - method: GET
              name: list-sessions
              call: "livy-rest-api.list-sessions"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-session
              call: "livy-rest-api.create-session"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/sessions/{sessionId}/statements
          name: statements
          operations:
            - method: POST
              name: run-statement
              call: "livy-rest-api.run-statement"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/batches
          name: batches
          operations:
            - method: GET
              name: list-batches
              call: "livy-rest-api.list-batches"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-batch
              call: "livy-rest-api.create-batch"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: livy-spark-management-mcp
      transport: http
      description: "MCP server for AI-assisted Apache Livy Spark job management."
      tools:
        - name: list-spark-sessions
          description: List all active interactive Spark sessions on the Livy server
          hints:
            readOnly: true
            openWorld: true
          call: "livy-rest-api.list-sessions"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-spark-session
          description: Create a new interactive Spark session for code execution
          hints:
            readOnly: false
          call: "livy-rest-api.create-session"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-session-state
          description: Get the current state of a Spark session
          hints:
            readOnly: true
            openWorld: true
          call: "livy-rest-api.get-session-state"
          with:
            sessionId: "tools.session_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: run-spark-code
          description: Execute a code statement in an interactive Spark session
          hints:
            readOnly: false
          call: "livy-rest-api.run-statement"
          with:
            sessionId: "tools.session_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-spark-session
          description: Delete an interactive Spark session
          hints:
            readOnly: false
            destructive: true
          call: "livy-rest-api.delete-session"
          with:
            sessionId: "tools.session_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: submit-batch-spark-job
          description: Submit a batch Spark job to the cluster via Livy
          hints:
            readOnly: false
          call: "livy-rest-api.create-batch"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-batch-state
          description: Get the current state of a batch Spark job
          hints:
            readOnly: true
            openWorld: true
          call: "livy-rest-api.get-batch-state"
          with:
            batchId: "tools.batch_id"
          outputParameters:
            - type: object
              mapping: "$."
